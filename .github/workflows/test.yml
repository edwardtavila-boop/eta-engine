name: test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # The repo is laid out flat (the package directory IS the repo root --
      # see CLAUDE.md). Treat ci.yml as the source of truth: install only the
      # deps the tests touch + symlink the repo into a parent dir named
      # apex_predator so `from apex_predator.foo import bar` resolves.
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            pytest pytest-asyncio pytest-cov \
            ruff \
            pydantic numpy pandas scipy aiohttp pyyaml \
            fastapi httpx \
            eth_account

      - name: Wire apex_predator as importable package
        run: |
          mkdir -p $GITHUB_WORKSPACE/_pkg_root
          ln -s $GITHUB_WORKSPACE $GITHUB_WORKSPACE/_pkg_root/apex_predator
          echo "PYTHONPATH=$GITHUB_WORKSPACE/_pkg_root:$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Ruff lint (production code)
        run: |
          ruff check \
            strategies/ \
            scripts/_bump_roadmap_v0_1_4*.py \
            scripts/_pre_commit_check.py \
            scripts/_new_roadmap_bump.py

      - name: Pytest with coverage
        run: |
          pytest tests/ -q \
            -m "not slow" \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing
        env:
          PYTHONDONTWRITEBYTECODE: "1"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: warn
