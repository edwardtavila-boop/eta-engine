name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ruff:
    name: ruff (production code)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install ruff
        run: python -m pip install --upgrade ruff
      - name: Lint strategies/ + scripts/_bump_roadmap_v0_1_4*.py + new helpers
        run: |
          python -m ruff check \
            strategies/ \
            scripts/_bump_roadmap_v0_1_4*.py \
            scripts/_pre_commit_check.py \
            scripts/_new_roadmap_bump.py

  pytest:
    name: pytest (full sweep)
    runs-on: ubuntu-latest
    needs: ruff
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            pytest \
            pytest-asyncio \
            pydantic \
            numpy \
            pandas \
            scipy \
            aiohttp \
            pyyaml \
            fastapi \
            httpx \
            eth_account
      - name: Wire apex_predator as importable package
        # The repo doesn't ship a pyproject.toml; tests import via
        # `from apex_predator.strategies...`. Make the parent dir
        # importable by symlinking the repo root into the package path.
        run: |
          mkdir -p $GITHUB_WORKSPACE/_pkg_root
          ln -s $GITHUB_WORKSPACE $GITHUB_WORKSPACE/_pkg_root/apex_predator
          echo "PYTHONPATH=$GITHUB_WORKSPACE/_pkg_root:$GITHUB_WORKSPACE" >> $GITHUB_ENV
      - name: Run pytest
        run: python -m pytest -x -q --no-header
        env:
          PYTHONDONTWRITEBYTECODE: "1"
