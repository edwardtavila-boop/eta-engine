name: firm-gate

on:
  pull_request:
    branches: [paper, live]

jobs:
  firm-board:
    name: Firm board verdict
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Engage Firm board
        id: firm
        run: |
          python -m eta_engine.scripts.engage_firm_board \
            --spec eta_engine/docs/firm_spec_crypto_perp.json \
            --output /tmp/firm_verdict.json
          VERDICT=$(python -c "import json; print(json.load(open('/tmp/firm_verdict.json')).get('verdict','UNKNOWN'))")
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"

      - name: Fail on KILL or NO_GO
        if: steps.firm.outputs.verdict == 'KILL' || steps.firm.outputs.verdict == 'NO_GO'
        run: |
          echo "Firm verdict=${{ steps.firm.outputs.verdict }} -- blocking deployment"
          exit 1

      - name: Comment verdict on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '### Firm board verdict\n';
            try {
              const v = JSON.parse(fs.readFileSync('/tmp/firm_verdict.json', 'utf8'));
              body += '```json\n' + JSON.stringify(v, null, 2) + '\n```';
            } catch (e) {
              body += '_Verdict file missing._';
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
