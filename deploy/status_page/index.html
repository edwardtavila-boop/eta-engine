<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Evolutionary Trading Algo — Live</title>
<meta http-equiv="Cache-Control" content="no-store,no-cache,must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e0e0e0;font-family:system-ui,-apple-system,sans-serif;padding:2rem}
h1{background:linear-gradient(90deg,#00ff88,#00ccff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:1.5rem;margin-bottom:.5rem}
.sub{color:#888;font-size:.85rem;margin-bottom:2rem}
.row{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:2rem}
.card{background:#111;border:1px solid #222;border-radius:8px;padding:1.2rem;flex:1;min-width:280px}
.card h2{color:#00ff88;font-size:1rem;margin-bottom:.8rem;text-transform:uppercase;letter-spacing:1px}
.stat{font-size:2rem;font-weight:bold}
.green{color:#00ff88}.yellow{color:#ffcc00}.red{color:#ff4444}.dim{color:#555}
table{width:100%;border-collapse:collapse;font-size:.85rem}
td,th{padding:6px 10px;text-align:left;border-bottom:1px solid #1a1a1a}
th{color:#555;font-size:.7rem;text-transform:uppercase;letter-spacing:1px}
.badge{padding:2px 6px;border-radius:3px;font-size:.7rem;font-weight:bold}
.win{background:#002200;color:#00ff88}.loss{background:#220000;color:#ff4444}.idle{background:#111;color:#666}
.pulse{animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
</style>
</head>
<body>
<h1>Evolutionary Trading Algo</h1>
<p class="sub">AI: ETA Reasoner · Steward · Executor (DeepSeek V4) &nbsp;|&nbsp; <span id="clock" class="dim"></span> &nbsp;|&nbsp; <span id="status" class="pulse yellow">Connecting...</span></p>

<div class="row">
  <div class="card"><h2>Total Bots</h2><div class="stat green" id="totalBots">—</div></div>
  <div class="card"><h2>Confirmed</h2><div class="stat green" id="confirmed">—</div></div>
  <div class="card"><h2>Today PnL</h2><div class="stat" id="todayPnl">—</div></div>
  <div class="card"><h2>Last Trade</h2><div class="stat dim" id="lastTrade" style="font-size:1rem">—</div></div>
</div>

<div class="card" style="max-width:100%">
  <h2>Fleet Roster</h2>
  <div id="roster">Loading...</div>
</div>

<script>
async function load(){
  try{
    const r=await fetch('/api/bot-fleet');const d=await r.json();
    document.getElementById('status').textContent=d.bots.length+' bots · '+d.truth_status;
    document.getElementById('status').className='green';
    document.getElementById('totalBots').textContent=d.bots.length;
    document.getElementById('confirmed').textContent=d.confirmed_bots;
    const pnls=d.bots.map(b=>b.todays_pnl||0).reduce((a,b)=>a+b,0);
    const el=document.getElementById('todayPnl');
    el.textContent='$'+pnls.toFixed(0);el.className='stat '+(pnls>0?'green':pnls<0?'red':'dim');
    const trades=d.bots.filter(b=>b.last_trade_ts).sort((a,b)=>b.last_trade_ts.localeCompare(a.last_trade_ts));
    document.getElementById('lastTrade').textContent=trades.length?trades[0].last_trade_ts.replace('T',' ').substring(0,19):'No trades';

    let html='<table><tr><th>Bot</th><th>Symbol</th><th>Strategy</th><th>Mode</th><th>Verdict</th><th>Status</th></tr>';
    for(const b of d.bots){
      const p=b.todays_pnl>0?'win':(b.todays_pnl<0?'loss':'idle');
      html+='<tr><td>'+b.id+'</td><td>'+b.symbol+'</td><td>'+b.tier+'</td><td>'+b.mode+'</td><td>'+b.last_jarvis_verdict+'</td><td class="'+p+'">'+b.status+'</td></tr>';
    }
    html+='</table>';
    document.getElementById('roster').innerHTML=html;
  }catch(e){document.getElementById('status').textContent='API offline';document.getElementById('status').className='red'}
}
function tick(){document.getElementById('clock').textContent=new Date().toISOString().replace('T',' ').substring(0,19)+' UTC'}
load();setInterval(load,15000);setInterval(tick,1000);tick();
</script>
</body>
</html>
