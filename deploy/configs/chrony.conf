# EVOLUTIONARY TRADING ALGO  //  chrony.conf
#
# Drop into /etc/chrony/chrony.conf on the VPS (replacing the distro
# default). Then: systemctl restart chrony.
#
# Why chrony over systemd-timesyncd?
#   * chrony recovers from large clock jumps without restarting the
#     daemon -- critical because broker fill-replays bounce on >100 ms
#     skew and we cannot afford a manual intervention if NTP drifts.
#   * Lower steady-state offset (~1 ms vs ~10 ms) under typical VPS
#     virtualization clock drift.
#
# Pool selection: NTP Pool + Cloudflare's NTS server (authenticated TLS,
# protects against on-path NTP tampering).

# --- servers ---
pool   pool.ntp.org           iburst maxsources 4
server time.cloudflare.com    iburst nts
server ntp1.hetzner.com       iburst
server ntp2.hetzner.com       iburst

# --- drift + step ---
driftfile /var/lib/chrony/chrony.drift

# Allow large step on startup (don't slow-skew a 5-minute drift; just
# step it). After 3 corrections, refuse to step (slew only) -- so a
# malicious upstream can't time-warp us.
makestep 1.0 3

# Hardware-clock sync (so crashes don't lose accumulated drift).
rtcsync

# --- security ---
# We don't serve time to anyone.
allow 127.0.0.1
allow ::1
deny  0.0.0.0/0
deny  ::/0

# Local stratum so even if all upstream sources fail, we keep slewing.
local stratum 10

# Logging (sparse -- only when something interesting happens).
logdir   /var/log/chrony
log      tracking measurements statistics
logbanner 200
