# EVOLUTIONARY TRADING ALGO  //  resolved.conf
#
# Drop into /etc/systemd/resolved.conf on the VPS, then:
#   systemctl restart systemd-resolved
#   ln -sf /run/systemd/resolve/stub-resolv.conf /etc/resolv.conf
#
# What this buys
# --------------
#
# 1. **Stub resolver** with on-host caching -- fresh broker WS reconnects
#    skip the recursive lookup hop after the first hit, saving ~30 ms
#    per reconnect. Critical when an exchange WS flaps under load.
#
# 2. **DNSSEC validation** -- protects against on-path NTP-style DNS
#    tampering (a poisoned broker DNS record would let an attacker MITM
#    the API endpoint).
#
# 3. **DNS-over-TLS to Cloudflare + Quad9** -- encrypted lookups,
#    plus the fallback split prevents single-vendor outage from blacking
#    us out (Cloudflare 1.1.1.0 outage 2025-04 took out a competing
#    fund for 4 hours).
#
# Trade-off: DNSSEC failures NXDOMAIN broker hostnames hard. We accept
# that — better to fail closed than to trade against a spoofed quote.

[Resolve]
# Primary: Cloudflare 1.1.1.1 (DoT). Secondary: Quad9 (DoT).
DNS=1.1.1.1#cloudflare-dns.com 1.0.0.1#cloudflare-dns.com
FallbackDNS=9.9.9.9#dns.quad9.net 149.112.112.112#dns.quad9.net

# Encrypt + validate
DNSOverTLS=yes
DNSSEC=allow-downgrade
Cache=yes

# Stub listener at 127.0.0.53:53 (the on-host cache lives here).
DNSStubListener=yes

# Reasonable TTL caps; longer than 1h is suspicious for a CDN-fronted
# broker hostname, shorter than 30s thrashes the cache.
ReadEtcHosts=yes
