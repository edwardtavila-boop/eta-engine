# EVOLUTIONARY TRADING ALGO  //  configs/bot_broker_routing.yaml
# Per-bot broker routing config consumed by eta_engine.scripts.broker_router.
#
# Maps bot_id -> {venue, normalized_symbol}.
# Bot IDs are extracted from filename: <bot_id>.pending_order.json
# Venue values:
#   "ibkr"   -> LiveIbkrVenue   (PRIMARY active futures broker)
#   "tasty"  -> TastytradeVenue (SECONDARY futures broker; cert sandbox lacks crypto)
#   "alpaca" -> AlpacaVenue     (PAUSED/CELLARED spot-paper lane as of 2026-05-12)
#
# Workspace hard rule #2: Tradovate stays DORMANT unless the operator
# explicitly reactivates it (ETA_TRADOVATE_ENABLED=1) AND updates
# eta_engine.venues.router.DORMANT_BROKERS in the same batch.
#
# Symbol overrides translate the supervisor's raw symbol token to the form
# the target venue expects:
#   * IBKR PAXOS crypto: BTC -> BTCUSD, ETH -> ETHUSD, SOL -> SOLUSD
#   * Tastytrade crypto: BTC -> BTCUSDT, ETH -> ETHUSDT, SOL -> SOLUSDT
#   * Alpaca crypto:     BTC -> BTC/USD, ETH -> ETH/USD, etc. (BASE/USD form)
#   * Futures roots (MNQ/ES/NQ/RTY/M2K/MYM/GC/MGC/CL/MCL/NG/6E/M6E) pass through unchanged
#   * MNQ1/MYM1 (front-month supervisor forms) collapse to MNQ/MYM on IBKR
#
# Loader: eta_engine.scripts.broker_router.RoutingConfig.load()
# Override path via env: ETA_BROKER_ROUTING_CONFIG=/abs/path/to/file.yaml

version: 2
#
# Schema v2 (2026-05-06):
#   - `defaults` block: per-asset-class default venue. Used when a bot
#     has no explicit override under `bots:`. Futures -> ibkr today; spot
#     crypto retains legacy Alpaca routing only for cellar/backward-compat
#     audits until the operator reopens spot.
#   - `failover` block: ordered fallback chains. The router tries the
#     primary first, then walks the chain on a TRANSIENT failure
#     (network/timeout) or when the primary's circuit is open. A
#     deterministic reject (e.g. crypto-disabled) does NOT walk the
#     chain — those surface through the existing retry-meta machinery.
#   - `default` (no `s`) preserves v1 meaning so v1 yaml still loads.
#
# Resolution order (highest priority first) — see RoutingConfig.venue_for:
#   1. bots[<id>].venue        (explicit per-bot pin)
#   2. ETA_VENUE_OVERRIDE_<CLASS>  (operator env override)
#   3. defaults.<asset_class>      (yaml v2)
#   4. default.venue               (v1 back-compat)
#   5. "ibkr"                      (last resort)
#
# Operators can flip a whole asset class to a different venue at
# launch time without editing this file. Example:
#   PowerShell:  $env:ETA_VENUE_OVERRIDE_CRYPTO = "tastytrade"
#   bash/zsh:    export ETA_VENUE_OVERRIDE_CRYPTO=tastytrade

defaults:
  futures: ibkr
  crypto: alpaca
  # equity: alpaca   # reserved — flip on when equity routing lands

failover:
  # Crypto: alpaca primary, tasty becomes a real fallback once tasty
  # cert/live crypto enablement lands (api.support email pending).
  crypto: [alpaca, tastytrade]
  # Futures: ibkr primary, tasty as the secondary FCM.
  futures: [ibkr, tastytrade]

# Approved 2026-05-08 prop-test account aliases. These do not route
# anything by themselves; a bot must explicitly set `venue: tradovate`
# and `account_alias: <alias>`, and the live process must start with
# ETA_TRADOVATE_ENABLED=1. Keep env=demo until Tradovate demo/sim smoke
# passes for the specific prop account.
#
# Prop-account survival rule: new entries fail closed unless live equity
# telemetry is present and the proposed bracket fits inside daily loss,
# trailing drawdown, open-risk, and liquidation-buffer headroom. Keep
# max_order_risk_usd conservative until the 7-day paper soak proves the
# strategy can survive overnight unattended windows.
prop_accounts:
  blusky_launch_50k_phase1:
    venue: tradovate
    env: demo
    account_label: BSKELAUNCHEDWARD15586
    phase: launch_50k_phase1
    account_id_env: BLUSKY_LAUNCH_50K_TRADOVATE_ACCOUNT_ID
    creds_env_prefix: BLUSKY_LAUNCH_50K_
    bot_policy: explicit_allow_after_paper_soak
    starting_balance_usd: 50000
    current_equity_env: BLUSKY_LAUNCH_50K_CURRENT_EQUITY_USD
    peak_equity_env: BLUSKY_LAUNCH_50K_PEAK_EQUITY_USD
    daily_loss_used_env: BLUSKY_LAUNCH_50K_DAILY_LOSS_USED_USD
    daily_realized_pnl_env: BLUSKY_LAUNCH_50K_DAILY_REALIZED_PNL_USD
    open_risk_env: BLUSKY_LAUNCH_50K_OPEN_RISK_USD
    max_drawdown_floor_usd: 48000
    trailing_drawdown_usd: 2000
    target_balance_usd: 53000
    target_profit_usd: 3000
    daily_loss_limit_usd: 500
    liquidation_buffer_usd: 300
    max_order_risk_usd: 100
    consistency_max_day_profit_pct_of_target: 55
    consistency_buffer_usd: 150
    paper_soak_days_required: 3
    policy_source: BluSky Launch 50K Phase 1 portal snapshot 2026-05-12
  blusky_50k:
    venue: tradovate
    env: demo
    account_id_env: BLUSKY_TRADOVATE_ACCOUNT_ID
    creds_env_prefix: BLUSKY_
    bot_policy: explicit_allow
    starting_balance_usd: 50000
    current_equity_env: BLUSKY_CURRENT_EQUITY_USD
    peak_equity_env: BLUSKY_PEAK_EQUITY_USD
    daily_loss_used_env: BLUSKY_DAILY_LOSS_USED_USD
    open_risk_env: BLUSKY_OPEN_RISK_USD
    trailing_drawdown_usd: 2500
    daily_loss_limit_usd: 1500
    liquidation_buffer_usd: 500
    max_order_risk_usd: 250
    policy_source: https://blog.blusky.pro/blusky-blog/attention-prop-firm-traders
  mffu_50k:
    venue: tradovate
    env: demo
    account_id_env: MFFU_TRADOVATE_ACCOUNT_ID
    creds_env_prefix: MFFU_
    bot_policy: automation_allowed_with_limits
    starting_balance_usd: 50000
    current_equity_env: MFFU_CURRENT_EQUITY_USD
    peak_equity_env: MFFU_PEAK_EQUITY_USD
    daily_loss_used_env: MFFU_DAILY_LOSS_USED_USD
    open_risk_env: MFFU_OPEN_RISK_USD
    trailing_drawdown_usd: 2500
    daily_loss_limit_usd: 1500
    liquidation_buffer_usd: 500
    max_order_risk_usd: 250
    policy_source: https://help.myfundedfutures.com/en/articles/8444599-fair-play-and-prohibited-trading-practices

default:
  venue: ibkr
  symbol_overrides:
    # IBKR PAXOS crypto inventory: BTC, ETH, SOL only (no XRP/AVAX/LINK/DOGE).
    # Tastytrade cert sandbox crypto: pending api.support enablement (only 5 cryptos
    # available in cert anyway: BCH/BTC/ETH/LTC/DOGE).
    # Alpaca paper crypto: 73 pairs, all 7 of our bot bases tradeable.
    BTC:  { ibkr: BTCUSD,  tasty: BTCUSDT,  alpaca: "BTC/USD" }
    ETH:  { ibkr: ETHUSD,  tasty: ETHUSDT,  alpaca: "ETH/USD" }
    SOL:  { ibkr: SOLUSD,  tasty: SOLUSDT,  alpaca: "SOL/USD" }
    XRP:  { tasty: XRPUSDT,  alpaca: "XRP/USD" }
    AVAX: { alpaca: "AVAX/USD" }
    LINK: { alpaca: "LINK/USD" }
    DOGE: { tasty: DOGEUSDT, alpaca: "DOGE/USD" }
    MNQ1: { ibkr: MNQ, tradovate: MNQ }
    MNQ:  { ibkr: MNQ, tradovate: MNQ }
    ES:   { ibkr: ES }
    NQ:   { ibkr: NQ }
    RTY:  { ibkr: RTY }
    M2K:  { ibkr: M2K }
    MYM1: { ibkr: MYM }
    MYM:  { ibkr: MYM }
    GC:   { ibkr: GC }
    MGC:  { ibkr: MGC }
    CL:   { ibkr: CL }
    MCL:  { ibkr: MCL }
    NG:   { ibkr: NG }
    "6E": { ibkr: 6E }
    M6E:  { ibkr: M6E }
    # MBT/MET = CME crypto micro futures (NOT spot crypto). They route
    # to IBKR even though _classify_symbol() lumps them with crypto for
    # price-feed purposes. The bots: section pins specific bot_ids; the
    # symbol_overrides entries below ensure the on-the-wire symbol is
    # what IBKR expects (no /USD suffix — these are CME contracts).
    MBT:  { ibkr: MBT }
    MET:  { ibkr: MET }

bots:
  # Explicit per-bot overrides. Anything not listed inherits default.venue (ibkr).
  #
  # 2026-05-12: spot/Alpaca lanes are cellared while the prop-fund futures
  # lane is prepared. These legacy pins remain for audit/replay compatibility
  # and must not be promoted without a paired operator reactivation.
  #
  # 2026-05-05 (revised) — crypto routing flipped to Alpaca paper.
  # Reason: IBKR paper accounts cannot trade crypto (Paxos has no paper-trading
  # product). Tastytrade cert sandbox is wired up but the cert account doesn't
  # have crypto trading enabled (gated behind api.support email — pending).
  # Alpaca paper supports all 7 of our bot bases (BTC/ETH/SOL/XRP/AVAX/LINK/DOGE)
  # with $0 setup friction; smoke fills verified end-to-end (BTC market fills
  # at avg $81,247.80, real position 0.002175728 BTC).
  # Operator switches a specific crypto bot back to ibkr only after IBKR live
  # account is funded + crypto-enabled at the broker.
  #
  # Futures bots stay on ibkr (DUQ319869 paper).
  #
  # Prop-test activation example (leave commented until the prop account
  # credentials are present and ETA_TRADOVATE_ENABLED=1 is set in the
  # dedicated prop-test process):
  # volume_profile_mnq: { venue: tradovate, account_alias: blusky_launch_50k_phase1 }

  # ── Crypto bots (Alpaca paper cellar, account PA3HBV3PNWDN) ─────────
