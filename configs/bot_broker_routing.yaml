# EVOLUTIONARY TRADING ALGO  //  configs/bot_broker_routing.yaml
# Per-bot broker routing config consumed by eta_engine.scripts.broker_router.
#
# Maps bot_id -> {venue, normalized_symbol}.
# Bot IDs are extracted from filename: <bot_id>.pending_order.json
# Venue values:
#   "ibkr"   -> LiveIbkrVenue   (PRIMARY active futures broker)
#   "tasty"  -> TastytradeVenue (SECONDARY futures broker; cert sandbox lacks crypto)
#   "alpaca" -> AlpacaVenue     (ACTIVE crypto-paper broker as of 2026-05-05)
#
# Workspace hard rule #2: Tradovate stays DORMANT unless the operator
# explicitly reactivates it (ETA_TRADOVATE_ENABLED=1) AND updates
# eta_engine.venues.router.DORMANT_BROKERS in the same batch.
#
# Symbol overrides translate the supervisor's raw symbol token to the form
# the target venue expects:
#   * IBKR PAXOS crypto: BTC -> BTCUSD, ETH -> ETHUSD, SOL -> SOLUSD
#   * Tastytrade crypto: BTC -> BTCUSDT, ETH -> ETHUSDT, SOL -> SOLUSDT
#   * Alpaca crypto:     BTC -> BTC/USD, ETH -> ETH/USD, etc. (BASE/USD form)
#   * Futures roots (MNQ/ES/NQ/RTY/M2K/GC/MGC/CL/MCL/NG/6E/M6E) pass through unchanged
#   * MNQ1 (month-suffixed supervisor form) collapses to MNQ on IBKR
#
# Loader: eta_engine.scripts.broker_router.RoutingConfig.load()
# Override path via env: ETA_BROKER_ROUTING_CONFIG=/abs/path/to/file.yaml

version: 1

default:
  venue: ibkr
  symbol_overrides:
    # IBKR PAXOS crypto inventory: BTC, ETH, SOL only (no XRP/AVAX/LINK/DOGE).
    # Tastytrade cert sandbox crypto: pending api.support enablement (only 5 cryptos
    # available in cert anyway: BCH/BTC/ETH/LTC/DOGE).
    # Alpaca paper crypto: 73 pairs, all 7 of our bot bases tradeable.
    BTC:  { ibkr: BTCUSD,  tasty: BTCUSDT,  alpaca: "BTC/USD" }
    ETH:  { ibkr: ETHUSD,  tasty: ETHUSDT,  alpaca: "ETH/USD" }
    SOL:  { ibkr: SOLUSD,  tasty: SOLUSDT,  alpaca: "SOL/USD" }
    XRP:  { tasty: XRPUSDT,  alpaca: "XRP/USD" }
    AVAX: { alpaca: "AVAX/USD" }
    LINK: { alpaca: "LINK/USD" }
    DOGE: { tasty: DOGEUSDT, alpaca: "DOGE/USD" }
    MNQ1: { ibkr: MNQ }
    MNQ:  { ibkr: MNQ }
    ES:   { ibkr: ES }
    NQ:   { ibkr: NQ }
    RTY:  { ibkr: RTY }
    M2K:  { ibkr: M2K }
    GC:   { ibkr: GC }
    MGC:  { ibkr: MGC }
    CL:   { ibkr: CL }
    MCL:  { ibkr: MCL }
    NG:   { ibkr: NG }
    "6E": { ibkr: 6E }
    M6E:  { ibkr: M6E }

bots:
  # Explicit per-bot overrides. Anything not listed inherits default.venue (ibkr).
  #
  # 2026-05-05 (revised) — crypto routing flipped to Alpaca paper.
  # Reason: IBKR paper accounts cannot trade crypto (Paxos has no paper-trading
  # product). Tastytrade cert sandbox is wired up but the cert account doesn't
  # have crypto trading enabled (gated behind api.support email — pending).
  # Alpaca paper supports all 7 of our bot bases (BTC/ETH/SOL/XRP/AVAX/LINK/DOGE)
  # with $0 setup friction; smoke fills verified end-to-end (BTC market fills
  # at avg $81,247.80, real position 0.002175728 BTC).
  # Operator switches a specific crypto bot back to ibkr only after IBKR live
  # account is funded + crypto-enabled at the broker.
  #
  # Futures bots stay on ibkr (DUQ319869 paper).

  # ── Crypto bots (Alpaca paper, account PA3HBV3PNWDN) ───────────────
  btc_optimized:        { venue: alpaca }
  btc_hybrid:           { venue: alpaca }
  btc_regime_trend_etf: { venue: alpaca }
  btc_sage_daily_etf:   { venue: alpaca }
  btc_hybrid_sage:      { venue: alpaca }
  btc_ensemble_2of3:    { venue: alpaca }
  btc_crypto_scalp:     { venue: alpaca }
  btc_regime_trend:     { venue: alpaca }
  crypto_seed:          { venue: alpaca }
  eth_perp:             { venue: alpaca }
  eth_sweep_reclaim:    { venue: alpaca }
  eth_sage_daily:       { venue: alpaca }
  eth_compression:      { venue: alpaca }
  sol_perp:             { venue: alpaca }
  sol_directional:      { venue: alpaca }
  sol_sweep_scalp:      { venue: alpaca }
  xrp_perp:             { venue: alpaca }
  rsi_mr_btc:           { venue: alpaca }
  vwap_mr_btc:          { venue: alpaca }
  volume_profile_btc:   { venue: alpaca }
  gap_fill_btc:         { venue: alpaca }
  cross_asset_btc:      { venue: alpaca }
  funding_rate_btc:     { venue: alpaca }
  avax_sweep_reclaim:   { venue: alpaca }
  link_sweep_reclaim:   { venue: alpaca }
  doge_sweep_reclaim:   { venue: alpaca }

  # ── Futures bots (IBKR paper, DUQ319869) ───────────────────────────
  mnq_v7:               { venue: ibkr }
