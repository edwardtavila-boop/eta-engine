# APEX PREDATOR  //  configs/alerts.yaml
# Alerting channels — decision #17
# Primary: Pushover mobile push. Secondary: email digest. Escalation: SMS on kill.

channels:
  pushover:
    enabled: true
    env_keys:
      user:  PUSHOVER_USER
      token: PUSHOVER_TOKEN
    priority_map:
      info:     0   # quiet
      warn:     1   # high priority
      critical: 2   # emergency, repeat until ack

  email:
    enabled: true
    env_keys:
      smtp_host: SMTP_HOST
      smtp_port: SMTP_PORT
      smtp_user: SMTP_USER
      smtp_pass: SMTP_PASS
    to:   "edward.t.avila@gmail.com"
    from: "apex-predator@thefirm.local"
    digest_schedule_et: "08:00"

  sms:
    enabled: false   # activated on live-tiny flip via go_trigger.py
    env_keys:
      twilio_sid:   TWILIO_SID
      twilio_token: TWILIO_TOKEN
      from_number:  TWILIO_FROM
    to_number: "+1XXXXXXXXXX"   # populate on go-live

# Routing — which events go to which channel
routing:
  events:
    bot_entry:         { level: info,     channels: [pushover] }
    bot_exit_win:      { level: info,     channels: [pushover] }
    bot_exit_loss:     { level: info,     channels: [pushover] }
    circuit_trip:      { level: warn,     channels: [pushover, email] }
    dd_trip_wire_hit:  { level: critical, channels: [pushover, email, sms] }
    apex_rule_violate: { level: critical, channels: [pushover, email, sms] }
    kill_switch:       { level: critical, channels: [pushover, email, sms] }
    firm_red_gate:     { level: warn,     channels: [pushover, email] }
    preflight_fail:    { level: warn,     channels: [pushover, email] }
    weekly_review:     { level: info,     channels: [email] }
    # R1 broker-equity drift detector. Fires on transition into
    # broker_below_logical (broker net-liq cushion is < tier-A logical
    # equity by more than tolerance). Routed to pushover + email so
    # the operator gets a mobile push and a paper trail for post-mortem.
    # Re-fire on recovery+re-entry; sustained-drift re-fire is the
    # v0.2.x scope per the residual ledger.
    broker_equity_drift: { level: warn,     channels: [pushover, email] }
    # ApexRuntime lifecycle + verdict-execution events. All of these
    # were being dispatched in code (run_apex_live.py) but were not
    # registered here, so AlertDispatcher silently dropped them into
    # docs/alerts_log.jsonl with no Pushover / email / SMS delivery.
    # Caught by the v0.1.63 R1 Red Team review (B2) and the
    # scripts/_audit_alert_events.py audit that traced 7 missing events.
    runtime_start:        { level: info,     channels: [email] }
    runtime_stop:         { level: info,     channels: [email] }
    # Operator sign-off marker. Fired by ApexRuntime.run() once per
    # boot when --unpause + --operator are passed. Routes to
    # pushover + email so the operator (and inbox) sees an audit
    # entry tying the run to a human authorization.
    runtime_unpaused:     { level: info,     channels: [pushover, email] }
    boot_refused:         { level: critical, channels: [pushover, email, sms] }
    bot_error:            { level: warn,     channels: [pushover, email] }
    apex_preempt:         { level: warn,     channels: [pushover, email] }
    kill_switch_latched:  { level: critical, channels: [pushover, email, sms] }
    consistency_status:   { level: warn,     channels: [pushover, email] }
    # Cron-triggered nightly audit summary. The audit always emits
    # (pass / warn / fail verdict) so we route to email-only at INFO
    # to avoid pushover spam on the nominal-pass nights. The
    # audit-side payload includes failed_steps so the operator can
    # triage from the email body without paging.
    apex_nightly_audit:   { level: info,     channels: [email] }
    # B3 closure (v0.1.69) -- advisory signal that the tier-A
    # aggregate-equity invariant has been violated. Common cause:
    # a config copy-paste where two tier-A bots each track the
    # full account size instead of slicing it. WARN level (pushover
    # + email) so the operator sees it the next time they look at
    # the device but does not get woken up by a config bug.
    tier_a_invariant_violation: { level: warn, channels: [pushover, email] }
    # SLO tracker breach + recovery (sla_alerter.py). Breaches paged
    # via pushover + email; recoveries to email-only since they're
    # confirmatory ("the thing that was broken is now fine") and
    # don't warrant interrupting the operator. Cooldown logic in
    # sla_alerter.py prevents per-probe alert storms.
    apex_sla_breach:      { level: warn,     channels: [pushover, email] }
    apex_sla_recovered:   { level: info,     channels: [email] }

# Rate limits
rate_limit:
  info_per_minute: 10
  warn_per_minute: 5
  critical_per_minute: 0   # 0 = unthrottled (always send)
