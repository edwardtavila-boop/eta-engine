# EVOLUTIONARY TRADING ALGO  //  configs/tradovate.yaml
# Tradovate venue configuration — Tier-A bots (MNQ, NQ)
# Decisions source: docs/decisions_v1.json (APEX_DECISIONS_v1)

venue: tradovate
environment: demo   # demo | live  — flipped by scripts/go_trigger.py

# Apex Trader Funding eval constraints (decision #1)
apex_eval:
  enabled: true
  trailing_drawdown_usd: 2500
  daily_loss_limit_usd: 1500
  profit_target_usd: 2500
  min_trading_days: 7
  consistency_rule_pct: 30
  notes: "10% bucket DD ($500) trips BEFORE Apex trailing"

# Auth — all 6 required, read from env (see .env.example)
auth:
  env_keys:
    client_id: TRADOVATE_CLIENT_ID
    client_secret: TRADOVATE_CLIENT_SECRET
    username: TRADOVATE_USERNAME
    password: TRADOVATE_PASSWORD
    device_id: TRADOVATE_DEVICE_ID
    account_id: TRADOVATE_ACCOUNT_ID
  urls:
    demo_rest: "https://demo.tradovateapi.com/v1"
    live_rest: "https://live.tradovateapi.com/v1"
    demo_ws:   "wss://demo.tradovateapi.com/v1/websocket"
    live_ws:   "wss://md.tradovateapi.com/v1/websocket"

# Contracts traded (decision #3 — MNQ only at first, NQ added later)
contracts:
  mnq:
    symbol: "MNQUxxxx"   # rolling front month from Tradovate API
    tick_size: 0.25
    tick_value_usd: 0.50
    exchange: "CME"
    active: true
  nq:
    symbol: "NQUxxxx"
    tick_size: 0.25
    tick_value_usd: 5.00
    exchange: "CME"
    active: false        # flipped after MNQ 30 trades green

# Per-bot sizing (decision #3 + #4)
sizing:
  mnq:
    contracts_per_entry: 1
    max_concurrent: 1
    bucket_equity_usd: 5000
    max_bucket_loss_usd: 500   # 10% trip-wire
  nq:
    contracts_per_entry: 1
    max_concurrent: 1
    bucket_equity_usd: 12000
    max_bucket_loss_usd: 1200

# Session gating — no overnight, no news-window entry
session:
  allow_rth_only: true
  skip_first_5m_after_open: true
  flat_by_et: "15:55"
  news_blackout_minutes_before: 5
  news_blackout_minutes_after: 5

# Circuit breakers
circuit_breakers:
  consecutive_losses: 3
  on_trip: "flatten_and_pause_until_next_session"
  daily_loss_flip: "flatten_all"

# Reconciliation
reconciliation:
  on_reconnect: "verify_position_and_open_orders_before_new_entries"
  idempotency_key_prefix: "apex-mnq-"
  stale_order_timeout_sec: 30
