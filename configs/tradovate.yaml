# EVOLUTIONARY TRADING ALGO  //  configs/tradovate.yaml
# Tradovate venue configuration - prop-test futures bots (MNQ first)
# Decisions source: var/eta_engine/state/decisions_v1.json (ETA_DECISIONS_v1)

venue: tradovate
environment: demo   # demo | live - keep demo until prop-account smoke passes

# Generic prop-fund eval constraints. Firm-specific limits live in
# configs/bot_broker_routing.yaml prop_accounts and must be confirmed at sign-up.
eta_eval:
  enabled: true
  account_label: BSKELAUNCHEDWARD15586
  account_size_usd: 50000
  max_drawdown_floor_usd: 48000
  trailing_drawdown_usd: 2000
  daily_loss_limit_usd: 500
  profit_target_usd: 3000
  profit_target_balance_usd: 53000
  min_trading_days: 7
  consistency_rule_pct: 55
  consistency_rule_basis: target_profit
  notes: "Launch 50K Phase 1: preserve the $48K floor first; paper-soak with tiny MNQ risk before Tradovate cutover."

# Auth - all 6 required for live/demo broker connectivity, read from env
# or the configured secrets backend. Prop-specific lanes may use prefixed
# env vars documented in bot_broker_routing.yaml.
auth:
  env_keys:
    client_id: TRADOVATE_CLIENT_ID
    client_secret: TRADOVATE_CLIENT_SECRET
    username: TRADOVATE_USERNAME
    password: TRADOVATE_PASSWORD
    device_id: TRADOVATE_DEVICE_ID
    account_id: TRADOVATE_ACCOUNT_ID
  urls:
    demo_rest: "https://demo.tradovateapi.com/v1"
    live_rest: "https://live.tradovateapi.com/v1"
    demo_ws:   "wss://demo.tradovateapi.com/v1/websocket"
    live_ws:   "wss://md.tradovateapi.com/v1/websocket"

# Contracts traded. MNQ is the first prop-fund lane; NQ waits until MNQ
# builds enough buffer and account rule headroom.
contracts:
  mnq:
    symbol: "MNQUxxxx"   # rolling front month from Tradovate API
    tick_size: 0.25
    tick_value_usd: 0.50
    exchange: "CME"
    active: true
  nq:
    symbol: "NQUxxxx"
    tick_size: 0.25
    tick_value_usd: 5.00
    exchange: "CME"
    active: false

# Per-bot sizing: start small while the prop-test lane proves execution,
# reconciliation, and drawdown behavior.
sizing:
  mnq:
    contracts_per_entry: 1
    max_concurrent: 1
    bucket_equity_usd: 3000
    max_bucket_loss_usd: 300
    max_order_risk_usd: 100
  nq:
    contracts_per_entry: 1
    max_concurrent: 1
    bucket_equity_usd: 12000
    max_bucket_loss_usd: 1200

# Session gating - no overnight, no news-window entry.
session:
  allow_rth_only: true
  skip_first_5m_after_open: true
  flat_by_et: "15:55"
  news_blackout_minutes_before: 5
  news_blackout_minutes_after: 5

# Circuit breakers
circuit_breakers:
  consecutive_losses: 3
  on_trip: "flatten_and_pause_until_next_session"
  daily_loss_flip: "flatten_all"

# Reconciliation
reconciliation:
  on_reconnect: "verify_position_and_open_orders_before_new_entries"
  idempotency_key_prefix: "eta-prop-mnq-"
  stale_order_timeout_sec: 30
