repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-ast
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        name: mypy (strict on eta_engine/core)
        files: ^eta_engine/core/
        args: ["--strict", "--ignore-missing-imports"]
        additional_dependencies: ["pydantic>=2.0"]

  # ---------------------------------------------------------------------
  # Operator mandates M1 + M4 (2026-04-26): all paths under
  # C:\EvolutionaryTradingAlgo\. Block any commit that introduces a stale
  # legacy workspace reference in active code. Add '# HISTORICAL-PATH-OK'
  # on the line for an explicit one-off bypass.
  # ---------------------------------------------------------------------
  - repo: local
    hooks:
      - id: lint-stale-paths
        name: lint stale paths (M1/M4 - block legacy workspace refs)
        entry: python scripts/lint_stale_paths.py
        language: system
        files: \.(py|ps1|bat|cmd|sh|md|yaml|yml|toml|json|js|ts|tsx)$
        pass_filenames: true
